general {
    hide_cursor = true
}

animations {
    enabled = true

    bezier = easeOut, 0.25, 1, 0.5, 1

    animation = fadeIn, 1, 4, easeOut
    animation = fadeOut, 1, 4, easeOut
    animation = inputFieldWidth, 1, 3, easeOut
    animation = inputFieldColors, 1, 4, easeOut
    animation = inputFieldDots, 1, 2, easeOut
}

background {
    monitor =
    path = ~/.config/hypr/assets/background.png

    blur_passes = 2
    blur_size = 8

    brightness = 0.8
    contrast = 1.1
    vibrancy = 0.2
}

label {
    monitor =
    text = cmd[update:1000] date +"%I:%M %p"
    font_size = 80
    font_family = Poppins

    color = rgba(ffffffff)

    position = 0, 380
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date +"%A, %d %B %Y"
    font_size = 22
    font_family = Poppins

    color = rgba(ccccccff)

    position = 0, 300
    halign = center
    valign = center
}

image {
    monitor =
    path = ~/.config/hypr/assets/avatar.png

    size = 180
    rounding = 999

    border_size = 3
    border_color = rgba(4f8cffee)

    position = 0, 90
    halign = center
    valign = center
}

label {
    monitor =
    text = Bhupesh

    font_size = 28
    font_family = Poppins

    color = rgba(ffffffff)

    position = 0, -40
    halign = center
    valign = center
}

input-field {
    monitor =

    size = 320, 60

    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3

    rounding = 18

    outer_color = rgba(4f8cffee)
    inner_color = rgba(1e1e2ecc)
    font_color = rgba(ffffffff)

    fade_on_empty = false

    placeholder_text = Password...

    position = 0, -160
    halign = center
    valign = center
}
