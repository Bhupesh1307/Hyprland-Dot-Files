general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
}

# dim screen
listener {
    timeout = 180
    on-timeout = sh -c 'brightnessctl g > /tmp/hypridle-brightness && brightnessctl set 10%'
    on-resume = sh -c 'brightnessctl s "$(cat /tmp/hypridle-brightness)"'
}

# screen off
listener {
    timeout = 185
    on-timeout = hyprctl dispatch 'hl.dsp.dpms({ action = "disable" })'
    on-resume = hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })'
}

# screen lock
listener {
    timeout = 186
    on-timeout = loginctl lock-session
}

# suspend
listener {
	timeout = 1800
	on-timeout = systemctl suspend
}
